# Number of GPUs used. Passed to vllm.LLM.tensor_parallel_size notice that SCC
# will only give us single nodes with multiple GPUs, so we never need to do
# multinode distributed inference
n_gpus: 4

# fraction of gpu memory reserved for model + attention.  higher values will
# give higher throughput but risk giving out-of-memory errors when processing
# large amounts of text
gpu_memory_utilization: 0.9
# max_model_len: 90000
max_model_len: 10000

# Memory amount to offload to cpu to simulate extra gpu memory. Slow but lets
# you load models larger than your gpu
cpu_offload_gb: 0

# seed for random sampling during text generation
llm_sampling_seed: 1

# Enforce eager execution? With eager execution the CUDA graph is not built
# beforehand, unclear which option has better performance
enforce_eager: false

# Chunked prefill improves inter-token latency and generation decode because #
# decode requests are prioritized. It helps achieve better GPU utilization by
# locating compute-bound (prefill) and memory-bound (decode) requests to the
# same batch.
enable_chunked_prefill: true

# LoRA
enable_lora: false

# system_prompt: "You are a helpful AI assistant that provides well-reasoned and detailed responses. First, think step by step through the reasoning process as an internal monologue, and then provide the user with the final answer within \\boxed{}. Respond using the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>, i.e., the reasoning process should be enclosed within <think>...</think> tags, and the final answer within <answer>...</answer> tags. Reply in English only, do not use other languages."

# system_prompt: "Please reason step by step, and put your final answer within \\boxed{}. Respond using the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>, i.e., the reasoning process should be enclosed within <think>...</think> tags, and the final answer within <answer>...</answer> tags. Reply in English only, do not use other languages."

system_prompt: "Please reason step by step, and put your final answer within \\boxed{}. The reasoning process should be enclosed within <think> </think> and the answer within <answer> </answer> tags, respectively, i.e., <think> reasoning process here </think> <answer> answer here </answer>. Reply in English only, do not use other languages."

# sampling parameters
# temperature: 0.6
# min_p: 0 # minimum probability for a token to be considered, relative to most probable token. Set to 0 to disable
# top_p: 0.95 # consider candidate tokens until the cumulative sum of their probabilities is top_p
# top_k: 20

# temperature: 0.7
# min_p: 0 # minimum probability for a token to be considered, relative to most probable token. Set to 0 to disable
# top_p: 0.8 # consider candidate tokens until the cumulative sum of their probabilities is top_p
# top_k: 20

temperature: 1.0
min_p: 0 # minimum probability for a token to be considered, relative to most probable token. Set to 0 to disable
top_p: 1.0 # consider candidate tokens until the cumulative sum of their probabilities is top_p
# top_k: 20

min_tokens: 0 # minimum number of tokens to generate
max_new_tokens: 5000 # maximum number of tokens to generate
# repetition_penalty: 1.0 # values larger than 1 discourage the use of tokens that have been already generated

# read at most this many questions from the benchmark, so it's easy to run a subset
max_questions: 10000000

# number of sequences to generate per prompt
n: 16

# each item should be the path to a benchmark folder
# a benchmark folder must contain an answer schema if running with guided decoding
# the content of the benchmark should be in a JSONL file
benchmarks:
  - 'benchmarks/nacc_test/test_np'
  # - 'benchmarks/nacc_test/test_etpr'
  # - 'benchmarks/nacc_test/test_cog'
  # - 'benchmarks/nacc_test/test_mci'