# Model info
# LLaMA 3 8B: meta-llama/Meta-Llama-3-8B-Instruct
model_name : "meta-llama/Meta-Llama-3.1-8B-Instruct"

# Freeze language model. Set to False to train the projection layer
freeze_lm : False
# freeze_input_layer : True

# Dataset info
# dataset_path : "./data/1022/train_data/train.json"
dataset_path : "/projectnb/vkolagrp/skowshik/foundation_adrd/adrd-foundation-model/data/1022/eeg/eeg_data.json"
cache_dir : "/projectnb/vkolagrp/skowshik/.cache/hub/"

# This is my Hugging Face `read` and `write` tokens. Please replace it to yours.
# `read` token: for downloading models
# `write` token: for uploading your models to Hugging Face
# For your information: https://huggingface.co/settings/tokens
hf_read_token : "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"  # Hugging Face `read` Token
hf_write_token : "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"  # Hugging Face `write` Token

# LoRA
# LoRA attention dimension
lora_r : 8
# Alpha parameter for LoRA scaling
lora_alpha : 16
# Dropout probability for LoRA layers
lora_dropout : 0.1

# Saving path
result_dir : "./results"
# save_dir : "./ckpt/fine_tuned_v5"
save_dir : "./ckpt/v2_llama31_70b_adrd_text"
data_save_dir : "./data"

# user, system, assistant
user : "patient_summary"
assistant : "answer"
sysmsg : "You are a helpful behavioral neurologist AI assistant."
train_type : "text"
# usermsg_prefix : "Using the information provided, provide a cognitive diagnosis for a patient presenting with the following information."

# Training length and number of the generated tokens
train_max_len : 1024
# max_new_tokens : 2048
# k : 2

# Batch size
train_batch_size : 4

# Number of training epochs
epochs : 1

# Optimizer, Learning rate schedule, warm-up ratio
# paged_adamw_8bit, adamw_torch
optim : "paged_adamw_8bit"
lr_scheduler_type : "cosine"
warmup_ratio : 0.03

# activation checkpointing
# When enabled, a lot of memory can be freed at the cost of small decrease in the training speed
# due to recomputing parts of the graph during back-propagation.
gradient_checkpointing : True
# Number of update steps to accumulate the gradients
gradient_accumulation_steps : 1
# Initial learning rate
learning_rate : 0.000005
# Weight decay to apply to all layers except bias/LayerNorm weights
weight_decay : 0.01

# Save the model for a number of steps
save_strategy : "steps"
# Save the model and tokenizer every 100 steps
save_steps : 100
# Whether to save the optimizer and scheduler
save_only_model : False
# Number of total saved checkpoints
save_total_limit : 10

# Log every X updates steps
logging_steps : 1
# Logging save platform
log_save_platform : "wandb"

# Output directory where the model predictions and checkpoints will be stored
# Enable fp16/bf16 training (set bf16 to True with an A100)
# Whether to use fp16 16-bit (mixed) precision training instead of 32-bit training.
fp16 : False
# Whether to use bf16 16-bit (mixed) precision training instead of 32-bit training. Requires Ampere or higher
# NVIDIA architecture or using CPU (use_cpu) or Ascend NPU. This is an experimental API and it may change.
bf16 : True

# Pack multiple short examples in the same input sequence to increase efficiency
device_map : "auto"
# The number of GPUs for vLLM Engine
# https://docs.vllm.ai/en/latest/serving/distributed_serving.html
# num_gpus_vllm : 4
# gpu_utilization_vllm : 0.95

# Push to huggingface hub
push_to_hub : True
# hub_model_id : "skowshik/adrd-test"
hub_model_id : "skowshik/llama31-70b-adrd-text"

# hub_final_model_id : "skowshik/llama3-8b-adrd-mri-end-to-end"